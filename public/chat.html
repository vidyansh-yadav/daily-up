<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Chat | Daily-Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-color: #00ff00;
        --secondary-color: #00ccff;
        --dark-bg: #0a0a0a;
        --terminal-bg: #1a1a1a;
        --text-color: #ffffff;
        --text-muted: #888888;
        --border-color: #333333;
        --admin-color: #ffaa00;
        --kick-color: #ff3333;
        --own-message-bg: rgba(0, 255, 0, 0.1);
        --other-message-bg: rgba(255, 255, 255, 0.03);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Courier New', monospace;
        background: var(--dark-bg);
        color: var(--text-color);
        overflow-x: hidden;
    }

    .matrix-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(0,255,0,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,255,0,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        pointer-events: none;
        z-index: -1;
    }

    /* Sidebar Styles */
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 260px;
        background: rgba(10, 10, 10, 0.95);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(10px);
        z-index: 100;
        overflow-y: auto;
    }

    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border-color);
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.3rem;
        font-weight: bold;
        color: var(--primary-color);
    }

    .logo i {
        font-size: 1.6rem;
    }

    .user-profile {
        text-align: center;
        padding: 1.5rem 0;
        border-bottom: 1px solid var(--border-color);
    }

    .avatar {
        width: 80px;
        height: 80px;
        background: rgba(0, 255, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        border: 2px solid var(--primary-color);
        overflow: hidden;
    }

    .avatar i {
        font-size: 2.5rem;
        color: var(--primary-color);
    }

    .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .user-profile h3 {
        margin-bottom: 0.3rem;
    }

    .user-email {
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .streak-display {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--warning-color);
        font-size: 0.9rem;
    }

    .quick-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        padding: 1rem 0;
        border-bottom: 1px solid var(--border-color);
    }

    .quick-stat {
        text-align: center;
    }

    .quick-stat i {
        font-size: 1.2rem;
        color: var(--primary-color);
        margin-bottom: 0.3rem;
    }

    .quick-stat h4 {
        font-size: 1.2rem;
        color: var(--text-color);
    }

    .sidebar-menu {
        list-style: none;
        margin-top: 1rem;
        flex-grow: 1;
    }

    .sidebar-menu li {
        margin-bottom: 0.3rem;
        cursor: pointer;
    }

    .sidebar-menu a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0.8rem 1rem;
        color: var(--text-color);
        text-decoration: none;
        border-radius: 4px;
        transition: all 0.3s;
    }

    .sidebar-menu a:hover {
        background: rgba(0, 255, 0, 0.1);
        color: var(--primary-color);
    }

    .sidebar-menu li.active a {
        background: rgba(0, 255, 0, 0.2);
        color: var(--primary-color);
        border-left: 3px solid var(--primary-color);
    }

    .sidebar-footer {
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
    }

    .motivation-card {
        background: rgba(0, 255, 0, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
    }

    .motivation-card h4 {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--primary-color);
        margin-bottom: 0.5rem;
    }

    .dev-credit {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.8rem;
    }

    .dev-name {
        color: var(--primary-color);
        font-weight: bold;
        font-size: 1rem;
    }

    /* Main Content */
    .main-content {
        margin-left: 260px;
        min-height: 100vh;
    }

    .top-bar {
        background: rgba(10, 10, 10, 0.9);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 99;
    }

    .search-box {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
        padding: 0.5rem 1rem;
        width: 300px;
    }

    .search-box i {
        color: var(--text-muted);
    }

    .search-box input {
        background: none;
        border: none;
        color: var(--text-color);
        margin-left: 10px;
        width: 100%;
        outline: none;
        font-family: 'Courier New', monospace;
    }

    .top-bar-right {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .notification-btn {
        background: none;
        border: none;
        color: var(--text-color);
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 4px;
        position: relative;
    }

    .user-menu {
        position: relative;
    }

    .user-menu-btn {
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .user-dropdown {
        position: absolute;
        top: 100%;
        right: 0;
        background: var(--terminal-bg);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        width: 200px;
        margin-top: 5px;
        display: none;
        z-index: 1000;
    }

    .user-dropdown.show {
        display: block;
    }

    .user-dropdown a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0.8rem 1rem;
        color: var(--text-color);
        text-decoration: none;
        cursor: pointer;
    }

    .user-dropdown a:hover {
        background: rgba(0, 255, 0, 0.1);
    }

    .user-dropdown hr {
        border: none;
        border-top: 1px solid var(--border-color);
        margin: 0.5rem 0;
    }

    /* Page Content */
    .page-content {
        padding: 2rem;
    }

    .page-content h2 {
        color: var(--primary-color);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 2rem;
    }

    /* Back Link */
    .back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        color: var(--primary-color);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 10px 20px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid var(--border-color);
        border-radius: 5px;
        z-index: 100;
    }

    .back-link:hover {
        border-color: var(--primary-color);
    }

    /* Chat Container */
    .chat-container {
        max-width: 900px;
        margin: 30px auto;
        background: rgba(0, 0, 0, 0.9);
        border: 1px solid var(--primary-color);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
    }

    .chat-header {
        background: var(--terminal-bg);
        padding: 15px 20px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chat-header h2 {
        color: var(--primary-color);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .online-count {
        background: rgba(0, 255, 0, 0.1);
        padding: 5px 15px;
        border-radius: 20px;
        color: var(--primary-color);
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .online-count i {
        font-size: 10px;
    }

    /* Chat Messages */
    .chat-messages {
        height: 500px;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .message-card {
        background: var(--other-message-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 15px;
        transition: all 0.3s;
    }

    .message-card.own-message {
        border-left: 4px solid var(--primary-color);
        background: var(--own-message-bg);
    }

    .message-card.admin-message {
        border-top: 2px solid var(--admin-color);
    }

    .message-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        padding-bottom: 5px;
        border-bottom: 1px solid var(--border-color);
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .username {
        color: var(--primary-color);
        font-weight: bold;
    }

    .admin-badge {
        background: var(--admin-color);
        color: black;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: bold;
    }

    .timestamp {
        color: var(--text-muted);
        font-size: 12px;
    }

    .message-content {
        color: var(--text-color);
        line-height: 1.5;
        word-wrap: break-word;
        margin-bottom: 10px;
    }

    .admin-controls {
        display: flex;
        gap: 5px;
    }

    .kick-btn {
        background: var(--kick-color);
        color: white;
        border: none;
        padding: 3px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        gap: 3px;
    }

    .kick-btn:hover {
        background: #cc0000;
    }

    .reply-section {
        margin-top: 10px;
        padding-left: 20px;
        border-left: 2px solid var(--border-color);
    }

    .reply-card {
        background: rgba(255, 255, 255, 0.02);
        border-radius: 4px;
        padding: 8px;
        margin-bottom: 8px;
    }

    .reply-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
    }

    .reply-username {
        color: var(--secondary-color);
        font-weight: bold;
        font-size: 13px;
    }

    .reply-text {
        color: #ccc;
        font-size: 13px;
    }

    .reply-input-area {
        display: flex;
        gap: 8px;
        margin-top: 10px;
    }

    .reply-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 8px;
        color: var(--text-color);
        font-family: 'Courier New', monospace;
        font-size: 13px;
    }

    .reply-input:focus {
        outline: none;
        border-color: var(--primary-color);
    }

    .reply-btn {
        background: var(--secondary-color);
        color: black;
        border: none;
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .reply-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 2px 8px rgba(0, 204, 255, 0.3);
    }

    /* Chat Input Area */
    .chat-input-area {
        padding: 20px;
        background: var(--terminal-bg);
        border-top: 1px solid var(--border-color);
    }

    .input-group {
        display: flex;
        gap: 10px;
    }

    .chat-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 5px;
        padding: 12px;
        color: var(--text-color);
        font-family: 'Courier New', monospace;
        resize: none;
        height: 80px;
        font-size: 14px;
    }

    .chat-input:focus {
        outline: none;
        border-color: var(--primary-color);
    }

    .send-btn {
        background: var(--primary-color);
        color: black;
        border: none;
        padding: 0 30px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 16px;
    }

    .send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
    }

    .char-counter {
        text-align: right;
        color: var(--text-muted);
        font-size: 12px;
        margin-top: 5px;
    }

    /* Empty State & Loading */
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
    }

    .empty-state i {
        font-size: 60px;
        margin-bottom: 20px;
        color: var(--border-color);
    }

    .empty-state h3 {
        color: var(--text-color);
        margin-bottom: 10px;
    }

    .empty-state p {
        color: var(--text-muted);
    }

    .loading {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
    }

    .loading i {
        animation: spin 1s linear infinite;
        color: var(--primary-color);
        font-size: 40px;
        margin-bottom: 20px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Animations */
    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
</style>
</head>
<body>
    <div class="matrix-bg"></div>
    
    <a href="/dashboard" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>
    
    <div class="chat-container">
        <div class="chat-header">
            <h2><i class="fas fa-comments"></i> Random Chat</h2>
            <div class="online-count">
                <i class="fas fa-circle" style="color: #00ff00; font-size: 10px;"></i>
                <span id="onlineCount">0</span> online
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading messages...</p>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-group">
                <textarea id="messageInput" class="chat-input" placeholder="Type your message..." maxlength="500"></textarea>
                <button class="send-btn" id="sendMessageBtn">
                    <i class="fas fa-paper-plane"></i>
                    Send
                </button>
            </div>
            <div class="char-counter">
                <span id="charCount">0</span>/500 characters
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
