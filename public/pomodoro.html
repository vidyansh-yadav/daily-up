<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer | Daily-Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    :root {
        --primary-color: #00ff00;
        --secondary-color: #00ccff;
        --dark-bg: #0a0a0a;
        --terminal-bg: #1a1a1a;
        --text-color: #ffffff;
        --text-muted: #888888;
        --border-color: #333333;
        --success-color: #00ff00;
        --warning-color: #ffaa00;
        --error-color: #ff3333;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Courier New', monospace;
        background: var(--dark-bg);
        color: var(--text-color);
        overflow-x: hidden;
    }

    .matrix-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(0,255,0,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,255,0,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        pointer-events: none;
        z-index: -1;
    }

    /* Sidebar Styles */
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 260px;
        background: rgba(10, 10, 10, 0.95);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(10px);
        z-index: 100;
        overflow-y: auto;
    }

    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border-color);
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.3rem;
        font-weight: bold;
        color: var(--primary-color);
    }

    .logo i {
        font-size: 1.6rem;
    }

    .user-profile {
        text-align: center;
        padding: 1.5rem 0;
        border-bottom: 1px solid var(--border-color);
    }

    .avatar {
        width: 80px;
        height: 80px;
        background: rgba(0, 255, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        border: 2px solid var(--primary-color);
    }

    .avatar i {
        font-size: 2.5rem;
        color: var(--primary-color);
    }

    .user-profile h3 {
        margin-bottom: 0.3rem;
        color: var(--text-color);
    }

    .user-email {
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .sidebar-menu {
        list-style: none;
        margin-top: 1rem;
        flex-grow: 1;
    }

    .sidebar-menu li {
        margin-bottom: 0.3rem;
    }

    .sidebar-menu a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0.8rem 1rem;
        color: var(--text-color);
        text-decoration: none;
        border-radius: 4px;
        transition: all 0.3s;
    }

    .sidebar-menu a:hover {
        background: rgba(0, 255, 0, 0.1);
        color: var(--primary-color);
    }

    .sidebar-menu li.active a {
        background: rgba(0, 255, 0, 0.2);
        color: var(--primary-color);
        border-left: 3px solid var(--primary-color);
    }

    /* Main Content */
    .main-content {
        margin-left: 260px;
        min-height: 100vh;
    }

    .top-bar {
        background: rgba(10, 10, 10, 0.9);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 99;
    }

    .search-box {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
        padding: 0.5rem 1rem;
        width: 300px;
    }

    .search-box i {
        color: var(--text-muted);
    }

    .search-box input {
        background: none;
        border: none;
        color: var(--text-color);
        margin-left: 10px;
        width: 100%;
        outline: none;
        font-family: 'Courier New', monospace;
    }

    .top-bar-right {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .notification-btn {
        background: none;
        border: none;
        color: var(--text-color);
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 4px;
        position: relative;
    }

    .user-menu {
        position: relative;
    }

    .user-menu-btn {
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* Page Content */
    .page-content {
        padding: 2rem;
    }

    .page-content h2 {
        color: var(--primary-color);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 2rem;
    }

    /* Timer Styles */
    .timer-container {
        max-width: 600px;
        margin: 2rem auto;
        text-align: center;
        padding: 2rem;
        background: rgba(0, 255, 0, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
    }
    
    .timer-display {
        font-size: 6rem;
        font-weight: bold;
        color: var(--primary-color);
        font-family: 'Courier New', monospace;
        margin: 2rem 0;
        text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
    }
    
    .timer-controls {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin: 2rem 0;
    }
    
    .timer-btn {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid var(--primary-color);
        background: transparent;
        color: var(--primary-color);
        font-size: 2rem;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    .timer-btn:hover:not(:disabled) {
        background: var(--primary-color);
        color: var(--dark-bg);
        transform: scale(1.1);
        box-shadow: 0 0 20px var(--primary-color);
    }
    
    .timer-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }
    
    .timer-modes {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin: 2rem 0;
    }
    
    .mode-btn {
        padding: 0.8rem 1.5rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        color: var(--text-color);
        cursor: pointer;
        transition: all 0.3s;
        font-family: 'Courier New', monospace;
    }
    
    .mode-btn.active {
        background: var(--primary-color);
        color: var(--dark-bg);
        border-color: var(--primary-color);
    }
    
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-top: 2rem;
    }
    
    .stat-card {
        background: rgba(255, 255, 255, 0.03);
        padding: 1rem;
        border-radius: 8px;
        text-align: center;
        border: 1px solid var(--border-color);
    }
    
    .stat-value {
        font-size: 2rem;
        font-weight: bold;
        color: var(--primary-color);
    }
    
    .stat-label {
        color: var(--text-muted);
        font-size: 0.9rem;
    }
    
    .focus-level {
        margin: 2rem 0;
        text-align: left;
    }
    
    .focus-level label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-color);
    }
    
    .focus-slider {
        width: 100%;
        height: 8px;
        background: var(--border-color);
        border-radius: 4px;
        outline: none;
        -webkit-appearance: none;
    }
    
    .focus-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        background: var(--primary-color);
        border-radius: 50%;
        cursor: pointer;
    }
    
    .session-history {
        margin-top: 2rem;
        text-align: left;
    }
    
    .session-history h3 {
        color: var(--primary-color);
        margin-bottom: 1rem;
    }
    
    .session-item {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem;
        border-bottom: 1px solid var(--border-color);
    }
</style>
</head>
<body>
    <div class="matrix-bg"></div>
    
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-terminal"></i>
                <span>DAILY-UP</span>
            </div>
        </div>
        
        <div class="user-profile">
            <div class="avatar">
                <i class="fas fa-user-secret"></i>
            </div>
            <h3 id="username">Loading...</h3>
            <p id="userEmail" class="user-email">user@example.com</p>
        </div>
        
        <ul class="sidebar-menu">
            <li data-page="dashboard">
                <a href="/dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            </li>
            <li class="active" data-page="pomodoro">
                <a><i class="fas fa-clock"></i> <span>Pomodoro</span></a>
            </li>
            <li data-page="journal">
                <a href="/journal"><i class="fas fa-book"></i> <span>Journal</span></a>
            </li>
            <li data-page="challenges">
                <a href="/challenges"><i class="fas fa-trophy"></i> <span>Challenges</span></a>
            </li>
        </ul>
    </nav>
    
    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search...">
            </div>
            <div class="top-bar-right">
                <button class="notification-btn" id="notificationBtn">
                    <i class="fas fa-bell"></i>
                </button>
                <div class="user-menu">
                    <button class="user-menu-btn" id="userMenuBtn">
                        <span>Pomodoro</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <div class="page-content">
            <h2><i class="fas fa-clock"></i> Pomodoro Timer</h2>
            
            <div class="timer-container">
                <div class="timer-modes">
                    <button class="mode-btn active" data-mode="work">Work</button>
                    <button class="mode-btn" data-mode="shortBreak">Short Break</button>
                    <button class="mode-btn" data-mode="longBreak">Long Break</button>
                </div>
                
                <div class="timer-display" id="timerDisplay">25:00</div>
                
                <div class="timer-controls">
                    <button class="timer-btn" id="timerStart" title="Start">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="timer-btn" id="timerPause" title="Pause" disabled>
                        <i class="fas fa-pause"></i>
                    </button>
                    <button class="timer-btn" id="timerReset" title="Reset">
                        <i class="fas fa-redo-alt"></i>
                    </button>
                </div>
                
                <div class="focus-level">
                    <label>Focus Level (1-10):</label>
                    <input type="range" id="focusLevel" class="focus-slider" min="1" max="10" value="7">
                    <div style="display: flex; justify-content: space-between; margin-top: 0.5rem;">
                        <span>😴 Low</span>
                        <span id="focusValue">7</span>
                        <span>⚡ High</span>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="todaySessions">0</div>
                        <div class="stat-label">Today</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalSessions">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalHours">0</div>
                        <div class="stat-label">Hours</div>
                    </div>
                </div>
                
                <div class="session-history" id="sessionHistory">
                    <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Recent Sessions</h3>
                    <!-- Sessions will load here -->
                </div>
            </div>
        </div>
    </main>
    
    <script src="js/auth.js"></script>
    <script src="js/pomodoro.js"></script>
</body>
</html>
