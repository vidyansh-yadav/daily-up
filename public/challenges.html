<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges | Daily-Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-color: #00ff00;
        --secondary-color: #00ccff;
        --dark-bg: #0a0a0a;
        --terminal-bg: #1a1a1a;
        --text-color: #ffffff;
        --text-muted: #888888;
        --border-color: #333333;
        --warning-color: #ffaa00;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Courier New', monospace;
        background: var(--dark-bg);
        color: var(--text-color);
        overflow-x: hidden;
    }

    .matrix-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(0,255,0,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,255,0,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
        pointer-events: none;
        z-index: -1;
    }

    /* Sidebar Styles */
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 260px;
        background: rgba(10, 10, 10, 0.95);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(10px);
        z-index: 100;
        overflow-y: auto;
    }

    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border-color);
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.3rem;
        font-weight: bold;
        color: var(--primary-color);
    }

    .logo i {
        font-size: 1.6rem;
    }

    .user-profile {
        text-align: center;
        padding: 1.5rem 0;
        border-bottom: 1px solid var(--border-color);
    }

    .avatar {
        width: 80px;
        height: 80px;
        background: rgba(0, 255, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        border: 2px solid var(--primary-color);
    }

    .avatar i {
        font-size: 2.5rem;
        color: var(--primary-color);
    }

    .user-profile h3 {
        margin-bottom: 0.3rem;
    }

    .user-email {
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .sidebar-menu {
        list-style: none;
        margin-top: 1rem;
        flex-grow: 1;
    }

    .sidebar-menu li {
        margin-bottom: 0.3rem;
    }

    .sidebar-menu a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0.8rem 1rem;
        color: var(--text-color);
        text-decoration: none;
        border-radius: 4px;
        transition: all 0.3s;
    }

    .sidebar-menu a:hover {
        background: rgba(0, 255, 0, 0.1);
        color: var(--primary-color);
    }

    .sidebar-menu li.active a {
        background: rgba(0, 255, 0, 0.2);
        color: var(--primary-color);
        border-left: 3px solid var(--primary-color);
    }

    /* Main Content */
    .main-content {
        margin-left: 260px;
        min-height: 100vh;
    }

    .top-bar {
        background: rgba(10, 10, 10, 0.9);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 99;
    }

    .search-box {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
        padding: 0.5rem 1rem;
        width: 300px;
    }

    .search-box input {
        background: none;
        border: none;
        color: var(--text-color);
        margin-left: 10px;
        width: 100%;
        outline: none;
        font-family: 'Courier New', monospace;
    }

    .top-bar-right {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .notification-btn {
        background: none;
        border: none;
        color: var(--text-color);
        cursor: pointer;
    }

    .user-menu-btn {
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* Page Content */
    .page-content {
        padding: 2rem;
    }

    .page-content h2 {
        color: var(--primary-color);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 2rem;
    }

    /* Challenges Styles */
    .challenges-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }
    
    .btn-create {
        background: var(--primary-color);
        color: var(--dark-bg);
        border: none;
        padding: 1rem 2rem;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-family: 'Courier New', monospace;
        font-size: 1rem;
    }
    
    .btn-create:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
    }
    
    .filter-section {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
    }
    
    .filter-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: 'Courier New', monospace;
    }
    
    .filter-btn.active {
        background: var(--primary-color);
        color: var(--dark-bg);
        border-color: var(--primary-color);
    }
    
    .challenges-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 1.5rem;
    }
    
    .challenge-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.5rem;
        transition: all 0.3s;
    }
    
    .challenge-card:hover {
        border-color: var(--primary-color);
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 255, 0, 0.1);
    }
    
    .challenge-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
    }
    
    .challenge-category {
        background: rgba(0, 204, 255, 0.1);
        color: var(--secondary-color);
        padding: 0.3rem 1rem;
        border-radius: 20px;
        font-size: 0.85rem;
    }
    
    .challenge-status {
        padding: 0.3rem 1rem;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
    }
    
    .status-active {
        background: rgba(0, 255, 0, 0.1);
        color: var(--primary-color);
    }
    
    .status-upcoming {
        background: rgba(255, 170, 0, 0.1);
        color: var(--warning-color);
    }
    
    .status-completed {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-muted);
    }
    
    .challenge-progress {
        margin: 1rem 0;
    }
    
    .challenge-progress h4 {
        margin-bottom: 0.5rem;
        color: var(--text-color);
    }
    
    .progress-bar {
        width: 100%;
        height: 8px;
        background: var(--border-color);
        border-radius: 4px;
        overflow: hidden;
        margin: 0.5rem 0;
    }
    
    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #00ff00, #00ccff);
        transition: width 0.3s;
    }
    
    .participants-list {
        display: flex;
        margin: 1rem 0;
    }
    
    .participant-avatar {
        width: 35px;
        height: 35px;
        background: rgba(0, 255, 0, 0.1);
        border-radius: 50%;
        border: 2px solid var(--dark-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        color: var(--primary-color);
        margin-right: -10px;
    }
    
    .challenge-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
    }
    
    .challenge-reward {
        color: gold;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }
    
    .btn-join {
        background: var(--primary-color);
        color: var(--dark-bg);
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-family: 'Courier New', monospace;
    }
    
    .btn-join:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
    }
    
    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .modal-content {
        background: var(--terminal-bg);
        border: 1px solid var(--primary-color);
        border-radius: 8px;
        width: 90%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-color);
    }

    .modal-header h2 {
        color: var(--primary-color);
    }

    .close-modal {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 2rem;
        cursor: pointer;
    }

    .modal-body {
        padding: 1.5rem;
    }

    .form-group {
        margin-bottom: 1rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-color);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 0.8rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        color: var(--text-color);
        font-family: 'Courier New', monospace;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        margin-top: 1.5rem;
    }

    .btn-submit {
        background: var(--primary-color);
        color: var(--dark-bg);
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        font-family: 'Courier New', monospace;
    }

    .btn-cancel {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-color);
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: 'Courier New', monospace;
    }
</style>
</head>
<body>
    <div class="matrix-bg"></div>
    
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-terminal"></i>
                <span>DAILY-UP</span>
            </div>
        </div>
        
       <!-- User profile elements needed -->
<div class="user-profile">
    <div class="avatar" id="userAvatar">
        <i class="fas fa-user-secret"></i>
    </div>
    <h3 id="username">Loading...</h3>
    <p id="userEmail" class="user-email">user@example.com</p>
    <div class="streak-display">
        <i class="fas fa-fire"></i>
        <span id="streakCount">0 day streak</span>
    </div>
</div>

<!-- Quick stats elements -->
<div class="quick-stats">
    <div class="quick-stat">
        <i class="fas fa-check-circle"></i>
        <div>
            <h4 id="todayCompleted">0</h4>
            <p>Today</p>
        </div>
    </div>
    <div class="quick-stat">
        <i class="fas fa-bullseye"></i>
        <div>
            <h4 id="totalHabits">0</h4>
            <p>Habits</p>
        </div>
    </div>
</div>

<!-- User dropdown -->
<div class="user-dropdown" id="userDropdown">
    <a href="/profile"><i class="fas fa-user"></i> Profile</a>
    <a id="settingsLink"><i class="fas fa-cog"></i> Settings</a>
    <hr>
    <a id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
        <ul class="sidebar-menu">
            <li data-page="dashboard">
                <a href="/dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            </li>
            <li data-page="pomodoro">
                <a href="/pomodoro"><i class="fas fa-clock"></i> <span>Pomodoro</span></a>
            </li>
            <li data-page="journal">
                <a href="/journal"><i class="fas fa-book"></i> <span>Journal</span></a>
            </li>
            <li class="active" data-page="challenges">
                <a><i class="fas fa-trophy"></i> <span>Challenges</span></a>
            </li>
        </ul>
    </nav>
    
    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search challenges...">
            </div>
            <div class="top-bar-right">
                <button class="notification-btn" id="notificationBtn">
                    <i class="fas fa-bell"></i>
                </button>
                <div class="user-menu">
                    <button class="user-menu-btn" id="userMenuBtn">
                        <span>Challenges</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <div class="page-content">
            <div class="challenges-header">
                <h2><i class="fas fa-trophy"></i> Challenges & Competitions</h2>
                <button class="btn-create" id="createChallengeBtn">
                    <i class="fas fa-plus"></i> Create Challenge
                </button>
            </div>
            
            <div class="filter-section">
                <button class="filter-btn active" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="upcoming">Upcoming</button>
                <button class="filter-btn" data-filter="my">My Challenges</button>
                <button class="filter-btn" data-filter="created">Created by Me</button>
            </div>
            
            <div class="challenges-grid" id="challengesGrid">
                <!-- Challenges will load here -->
            </div>
            
            <!-- Create Challenge Modal -->
            <div class="modal" id="createChallengeModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Create New Challenge</h2>
                        <button class="close-modal" id="closeChallengeModal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="challengeForm">
                            <div class="form-group">
                                <label>Challenge Name</label>
                                <input type="text" id="challengeName" required>
                            </div>
                            
                            <div class="form-group">
                                <label>Description</label>
                                <textarea id="challengeDescription" rows="3" required></textarea>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Category</label>
                                    <select id="challengeCategory">
                                        <option value="fitness">Fitness</option>
                                        <option value="coding">Coding</option>
                                        <option value="reading">Reading</option>
                                        <option value="meditation">Meditation</option>
                                        <option value="custom">Custom</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label>Type</label>
                                    <select id="challengeType">
                                        <option value="public">Public</option>
                                        <option value="private">Private</option>
                                        <option value="friends">Friends Only</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Goal Type</label>
                                    <select id="goalType">
                                        <option value="streak">Streak</option>
                                        <option value="completions">Total Completions</option>
                                        <option value="minutes">Minutes</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label>Target</label>
                                    <input type="number" id="goalTarget" min="1" value="7">
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Start Date</label>
                                    <input type="date" id="startDate">
                                </div>
                                
                                <div class="form-group">
                                    <label>End Date</label>
                                    <input type="date" id="endDate">
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Reward XP</label>
                                <input type="number" id="rewardXP" value="500" min="100" max="5000">
                            </div>
                            
                            <div class="form-actions">
                                <button type="submit" class="btn-submit">Create Challenge</button>
                                <button type="button" class="btn-cancel" id="cancelChallengeBtn">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="js/auth.js"></script>
    <script src="js/challenges.js"></script>
</body>
</html>
